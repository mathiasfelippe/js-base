<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 11a: Temporizador</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    #timer {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    button {
      margin: 5px;
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #007bff;
      color: white;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <!-- Temporizador -->
  <div id="timer">0</div>

  <!-- Botões de controle -->
  <button id="startButton">Iniciar</button>
  <button id="pause">Pausar</button>
  <button id="reset">Resetar</button>

  <!-- Script JavaScript -->
  <script>

    // 1ª Digitação (Resolva aqui o exercício)

    let tempo = 0; // tempo inicia no 0
    let intervalo = null; // o cronometro começa desligado

   //  busca elementos da página
    const timer = document.getElementById("timer");
    const startButton = document.getElementById("startButton");
    const pauseButton = document.getElementById("pause");
    const resetButton = document.getElementById("reset");

      function atualizarTimer() {
      tempo++; // adiciona + 1 ao tempo
      timer.textContent = tempo; // atualiza o tempo na página
    }

    startButton.addEventListener("click", function () {
      if (intervalo === null) { // verifica se o contador ja foi iniciado (cada clique a mais aumentaria a velocidade)
        intervalo = setInterval(atualizarTimer, 1000); // inicia o contador e aumenta o número a cada 1 seg
      }
    });

      pause.addEventListener("click", function () {
      clearInterval(intervalo); // faz a contagem parar
      intervalo = null; // faz com que o contador inicie novamente ao clicar em start
    });

      reset.addEventListener("click", function () {
      clearInterval(intervalo); // faz a contagem parar
      intervalo = null;
      tempo = 0; // deixa o contador igual a 0
      timer.textContent = tempo; // mostra o tempo (0) na tela
    });

  </script>

</body>
</html>
